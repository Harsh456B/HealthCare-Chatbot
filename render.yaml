services:
  - type: web
    name: MedicalChatbot-1
    env: docker
    repo: https://github.com/Harsh456B/MedicalChatbot
    branch: main
    dockerContext: .
    dockerfilePath: Dockerfile
    startCommand: gunicorn --preload --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 300 --graceful-timeout 120 app:app
    plan: free
