<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Chatbot - AI Assistant</title>
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
    <div class="container-fluid h-100">
        <div class="row justify-content-center h-100">
            <div class="col-md-8 col-xl-6 chat">
                <div class="card">
                    <!-- Chat Header -->
                    <div class="card-header msg_head">
                        <div class="d-flex bd-highlight">
                            <div class="img_cont">
                                <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" 
                                     class="rounded-circle user_img" 
                                     alt="Medical Bot">
                                <span class="online_icon"></span>
                            </div>
                            <div class="user_info">
                                <span>Medical Chatbot</span>
                                <p>Ask me anything about medical topics!</p>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Chat Messages Area -->
                    <div id="chatMessages" class="card-body msg_card_body">
                        <!-- Messages will be dynamically inserted here -->
                    </div>
                    
                    <!-- Chat Input Footer -->
                    <div class="card-footer">
                        <form id="chatForm" class="input-group">
                            <input type="text" 
                                   id="userInput" 
                                   name="msg" 
                                   placeholder="Type your message here..." 
                                   autocomplete="off" 
                                   class="form-control type_msg" 
                                   required/>
                            <div class="input-group-append">
                                <button type="submit" 
                                        id="sendButton" 
                                        class="input-group-text send_btn">
                                    <i class="fas fa-location-arrow"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>
    
    <!-- Chat Functionality -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const chatForm = document.getElementById("chatForm");
            const chatMessages = document.getElementById("chatMessages");
            const userInput = document.getElementById("userInput");
            
            // Handle form submission
            chatForm.addEventListener("submit", function(event) {
                event.preventDefault();
                
                const userMessage = userInput.value.trim();
                
                if (!userMessage) {
                    return;
                }
                
                // Get current time
                const now = new Date();
                const timeString = now.getHours() + ":" + 
                                  String(now.getMinutes()).padStart(2, '0');
                
                // Display user message
                const userMessageHtml = `
                    <div class="d-flex justify-content-end mb-4">
                        <div class="msg_cotainer_send">
                            ${escapeHtml(userMessage)}
                            <span class="msg_time_send">${timeString}</span>
                        </div>
                        <div class="img_cont_msg">
                            <img src="https://i.ibb.co/d5b84Xw/Untitled-design.png" 
                                 class="rounded-circle user_img_msg" 
                                 alt="User">
                        </div>
                    </div>
                `;
                
                chatMessages.insertAdjacentHTML('beforeend', userMessageHtml);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                
                // Clear input
                userInput.value = "";
                
                // Disable form while processing
                userInput.disabled = true;
                chatForm.querySelector('button').disabled = true;
                
                // Show typing indicator
                const typingIndicator = `
                    <div class="d-flex justify-content-start mb-4">
                        <div class="img_cont_msg">
                            <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" 
                                 class="rounded-circle user_img_msg" 
                                 alt="Bot">
                        </div>
                        <div class="msg_cotainer">
                            <span class="typing-indicator">Typing...</span>
                        </div>
                    </div>
                `;
                chatMessages.insertAdjacentHTML('beforeend', typingIndicator);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                
                // Send request to server
                const formData = new FormData();
                formData.append("msg", userMessage);
                
                fetch("/get", {
                    method: "POST",
                    body: formData
                })
                .then(response => response.text())
                .then(data => {
                    // Remove typing indicator
                    const typingElements = chatMessages.querySelectorAll('.typing-indicator');
                    typingElements.forEach(el => el.closest('.d-flex').remove());
                    
                    // Display bot response
                    const botMessageHtml = `
                        <div class="d-flex justify-content-start mb-4">
                            <div class="img_cont_msg">
                                <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" 
                                     class="rounded-circle user_img_msg" 
                                     alt="Bot">
                            </div>
                            <div class="msg_cotainer">
                                ${escapeHtml(data)}
                                <span class="msg_time">${timeString}</span>
                            </div>
                        </div>
                    `;
                    
                    chatMessages.insertAdjacentHTML('beforeend', botMessageHtml);
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                    
                    // Re-enable form
                    userInput.disabled = false;
                    chatForm.querySelector('button').disabled = false;
                    userInput.focus();
                })
                .catch(error => {
                    // Remove typing indicator
                    const typingElements = chatMessages.querySelectorAll('.typing-indicator');
                    typingElements.forEach(el => el.closest('.d-flex').remove());
                    
                    // Display error message
                    const errorMessageHtml = `
                        <div class="d-flex justify-content-start mb-4">
                            <div class="img_cont_msg">
                                <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" 
                                     class="rounded-circle user_img_msg" 
                                     alt="Bot">
                            </div>
                            <div class="msg_cotainer">
                                ${escapeHtml("Error: " + error.message)}
                                <span class="msg_time">${timeString}</span>
                            </div>
                        </div>
                    `;
                    
                    chatMessages.insertAdjacentHTML('beforeend', errorMessageHtml);
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                    
                    // Re-enable form
                    userInput.disabled = false;
                    chatForm.querySelector('button').disabled = false;
                    userInput.focus();
                });
            });
            
            // Helper function to escape HTML
            function escapeHtml(text) {
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return text.replace(/[&<>"']/g, function(m) { return map[m]; });
            }
            
            // Focus on input when page loads
            userInput.focus();
        });
    </script>
</body>
</html>
